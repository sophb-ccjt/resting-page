<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resting Page</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <p>Resting for: <a id="resting-time">0s</a></p>
    <br>
    <h3>Battery</h3>
    <p>Battery percentage: <a id='battery-percent'>???</a>%</p>
    <p>Battery is charging? <a id='battery-ischarging'>maybe</a></p>
    <p>Time until battery <a id="battery-chargetype">is batterying</a>: <a id="battery-chargetime">67s</a></p>
    <h3>Networking</h3>
    <p>Online? <a id="is-online">maybe</a></p>
    <p>Connection type: <a id="connection-type">???</a></p>
    <p>Effective type (speed): <a id="effective-type">???</a></p>
    <p>Ping: <a id='ping'>???</a></p>
    <h3>Misc</h3>
    <p>Current time and date: <a id="time-and-date"></a></p>
    <p>FPS: <a id=fps></a></p>
    <p>Heap used: <a id='heap-used'>???%</a></p>

    <script src="js.js"></script>
</body>
</html>
